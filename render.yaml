services:
  - type: web
    name: productos-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: productos-db
          property: connectionString
        # Render provee la URL en formato postgresql://, la convertimos a r2dbc:
        # Debes ajustar manualmente a: r2dbc:postgresql://...
      - key: DATABASE_USERNAME
        fromDatabase:
          name: productos-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: productos-db
          property: password
      - key: PORT
        value: "8080"

databases:
  - name: productos-db
    databaseName: productosdb
    plan: free
